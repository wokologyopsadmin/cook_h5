<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>" />
  <title>Wokology — 登录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-gray-50" data-page-title="login.title">

<!-- Hero -->
<div class="auth-hero min-h-[220px] flex flex-col items-center justify-center relative overflow-hidden">
  <div class="absolute top-0 right-0 w-48 h-48 bg-white/10 rounded-full -translate-y-1/2 translate-x-1/2"></div>
  <div class="absolute bottom-0 left-0 w-32 h-32 bg-white/10 rounded-full translate-y-1/2 -translate-x-1/2"></div>
  <div class="text-5xl mb-3 relative z-10">🤖</div>
  <h1 class="text-2xl font-bold relative z-10" data-i18n="app.name">Wokology</h1>
  <p class="text-white/80 text-sm mt-1 relative z-10 px-8 text-center" data-i18n="login.subtitle">登录您的 Wokology 炒菜机器人管理账号</p>
</div>

<!-- Card -->
<div class="auth-card">
  <div class="mb-4">
    <label class="block text-sm font-semibold text-gray-700 mb-1.5" data-i18n="login.account_label">账号</label>
    <input id="account" type="text" autocomplete="username"
      class="auth-input" data-i18n-ph="login.account_ph" placeholder="请输入邮箱或用户名" />
  </div>

  <div class="mb-2">
    <label class="block text-sm font-semibold text-gray-700 mb-1.5" data-i18n="login.password_label">密码</label>
    <div class="relative">
      <input id="password" type="password" autocomplete="current-password"
        class="auth-input pr-12" data-i18n-ph="login.password_ph" placeholder="请输入密码" />
      <button onclick="togglePwd(this)" tabindex="-1"
        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 p-1">
        <span class="material-icons-round text-xl">visibility_off</span>
      </button>
    </div>
  </div>

  <div class="text-right mb-6">
    <button class="text-orange-500 text-sm font-medium" data-i18n="login.forgot"
      onclick="showToast(getLang()==='zh'?'重置邮件已发送，请查收':'Reset email sent, please check your inbox')">
      忘记密码?
    </button>
  </div>

  <button onclick="doLogin()" class="auth-btn mb-4" data-i18n="login.btn">登 录</button>

  <div class="bg-blue-50 rounded-xl px-4 py-3 mb-4 flex items-start gap-2">
    <span class="material-icons-round text-blue-400 text-base mt-0.5">info</span>
    <p class="text-blue-600 text-xs leading-relaxed" data-i18n="login.demo_hint">演示模式：选择测试账号或输入任意账号密码登录</p>
  </div>

  <!-- Demo Accounts -->
  <div class="mb-5">
    <label class="block text-sm font-semibold text-gray-700 mb-2" data-i18n="login.demo_accounts">测试账号</label>
    <div class="grid grid-cols-2 gap-2">
      <button onclick="fillDemoAccount('admin', 'admin123', this)" class="demo-account-btn flex flex-col items-start p-3 rounded-xl border-2 border-gray-100 hover:border-orange-300 hover:bg-orange-50 transition-all">
        <span class="text-sm font-semibold text-gray-800">admin</span>
        <span class="text-xs text-gray-500" data-i18n="login.role_admin">系统管理员</span>
      </button>
      <button onclick="fillDemoAccount('newuser', '123456', this)" class="demo-account-btn flex flex-col items-start p-3 rounded-xl border-2 border-gray-100 hover:border-orange-300 hover:bg-orange-50 transition-all">
        <span class="text-sm font-semibold text-gray-800">newuser</span>
        <span class="text-xs text-gray-500" data-i18n="login.role_newuser">新用户</span>
      </button>
      <button onclick="fillDemoAccount('manager1', '123456', this)" class="demo-account-btn flex flex-col items-start p-3 rounded-xl border-2 border-gray-100 hover:border-orange-300 hover:bg-orange-50 transition-all">
        <span class="text-sm font-semibold text-gray-800">manager1</span>
        <span class="text-xs text-gray-500" data-i18n="login.role_manager">店长</span>
      </button>
      <button onclick="fillDemoAccount('manager2', '123456', this)" class="demo-account-btn flex flex-col items-start p-3 rounded-xl border-2 border-gray-100 hover:border-orange-300 hover:bg-orange-50 transition-all">
        <span class="text-sm font-semibold text-gray-800">manager2</span>
        <span class="text-xs text-gray-500" data-i18n="login.role_manager">店长</span>
      </button>
    </div>
  </div>

  <div class="text-center text-sm text-gray-500 mb-6">
    <span data-i18n="login.no_account">还没有账号?</span>
    <a href="register.html" class="text-orange-500 font-semibold ml-1" data-i18n="login.register_link">立即注册</a>
  </div>

</div>

<div id="toast"></div>

<script src="js/i18n.js"></script>
<script src="js/app.js"></script>
<script>
  if (localStorage.getItem('chefhub_logged_in')) {
    window.location.href = 'dashboard.html';
  }
  function togglePwd(btn) {
    const input = btn.previousElementSibling;
    const icon  = btn.querySelector('.material-icons-round');
    input.type = input.type === 'password' ? 'text' : 'password';
    icon.textContent = input.type === 'password' ? 'visibility_off' : 'visibility';
  }
  function fillDemoAccount(account, password, btn) {
    document.getElementById('account').value = account;
    document.getElementById('password').value = password;
    // Highlight selected button
    document.querySelectorAll('.demo-account-btn').forEach(b => b.classList.remove('border-orange-500', 'bg-orange-50'));
    if (btn) btn.classList.add('border-orange-500', 'bg-orange-50');
  }
  function doLogin() {
    const account = document.getElementById('account').value.trim();
    const pwd     = document.getElementById('password').value;
    if (!account || !pwd) {
      showToast(getLang() === 'zh' ? '请填写账号和密码' : 'Please enter account and password');
      return;
    }

    // 查找用户（包括动态创建的管理人员）
    const allUsers = getAllUsers();
    const foundUser = allUsers.find(u => u.account === account);

    // 验证密码（仅对已知用户验证）
    if (foundUser && foundUser.password !== pwd) {
      showToast(getLang() === 'zh' ? '密码错误' : 'Incorrect password');
      return;
    }

    // 检查账号状态
    if (foundUser && foundUser.status === 'inactive') {
      showToast(getLang() === 'zh' ? '账号已被停用，请联系管理员' : 'Account is disabled, please contact admin');
      return;
    }

    localStorage.setItem('chefhub_logged_in', '1');
    const userData = {
      id: foundUser ? foundUser.id : 0,
      name: foundUser ? (getLang() === 'en' ? (foundUser.nameEn || foundUser.name) : foundUser.name) : (account.includes('@') ? account.split('@')[0] : account),
      account: account,
      role: foundUser ? foundUser.role : 'user',
      roleLabel: foundUser ? (getLang() === 'en' ? foundUser.roleLabelEn : foundUser.roleLabel) : ''
    };
    localStorage.setItem('chefhub_user', JSON.stringify(userData));

    // 检查是否需要邮箱验证（store_manager 且未验证）
    if (foundUser && foundUser.role === 'store_manager' && !foundUser.emailVerified) {
      window.location.href = 'email-verify.html';
    } else {
      window.location.href = 'dashboard.html';
    }
  }
  function onLangChange() {}
</script>
</body>
</html>
