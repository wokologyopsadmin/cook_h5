<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>" />
  <title>Wokology — 菜谱详情</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-gray-50">

<div class="page-wrap fade-in">

  <!-- Hero Image -->
  <div class="relative">
    <img id="recipe-img" src="" alt="" class="w-full h-64 object-cover" />
    <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent"></div>
    <button onclick="goBack()" class="absolute top-10 left-4 w-10 h-10 bg-white/90 backdrop-blur-sm rounded-full flex items-center justify-center shadow-lg">
      <span class="material-icons-round text-gray-700">arrow_back</span>
    </button>
    <div id="recipe-tag" class="absolute top-10 right-4"></div>
  </div>

  <!-- Content -->
  <div class="px-5 -mt-8 relative z-10">
    <!-- Title Card -->
    <div class="bg-white rounded-2xl shadow-sm p-4 mb-4">
      <h1 id="recipe-name" class="text-xl font-bold text-gray-800 mb-2"></h1>
      <div class="flex items-center gap-4 text-sm text-gray-500">
        <div class="flex items-center gap-1">
          <span class="material-icons-round text-orange-500 text-lg">schedule</span>
          <span id="recipe-time"></span>
        </div>
        <div class="flex items-center gap-1">
          <span class="material-icons-round text-orange-500 text-lg">local_fire_department</span>
          <span id="recipe-diff"></span>
        </div>
      </div>
    </div>

    <!-- Ingredients -->
    <div class="bg-white rounded-2xl shadow-sm p-4 mb-4">
      <h2 class="text-base font-bold text-gray-800 mb-3 flex items-center gap-2">
        <span class="material-icons-round text-green-500">restaurant</span>
        <span data-i18n="recipe.ingredients">食材清单</span>
      </h2>
      <ul id="ingredients-list" class="space-y-2"></ul>
    </div>

    <!-- Cooking Steps -->
    <div class="bg-white rounded-2xl shadow-sm p-4 mb-4">
      <h2 class="text-base font-bold text-gray-800 mb-3 flex items-center gap-2">
        <span class="material-icons-round text-blue-500">format_list_numbered</span>
        <span data-i18n="recipe.steps">烹饪步骤</span>
      </h2>
      <ol id="steps-list" class="space-y-3"></ol>
    </div>

    <!-- Tips -->
    <div class="bg-orange-50 rounded-2xl p-4 mb-4">
      <h2 class="text-base font-bold text-orange-700 mb-2 flex items-center gap-2">
        <span class="material-icons-round">tips_and_updates</span>
        <span data-i18n="recipe.tips">小贴士</span>
      </h2>
      <p id="recipe-tips" class="text-sm text-orange-800/80"></p>
    </div>

    <!-- Action Button -->
    <button onclick="openSendModal()" class="w-full btn-elevated py-4 text-base font-semibold flex items-center justify-center gap-2 mb-4">
      <span class="material-icons-round">send</span>
      <span data-i18n="recipe.send_to_machine">发送到机器</span>
    </button>
  </div>

</div>

<!-- Send Recipe Sheet -->
<div id="send-modal" class="modal-overlay" onclick="closeSendModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h3 class="text-base font-bold text-gray-800 mb-1" data-i18n="recipes.choose_machine">选择要下发的机器</h3>
    <p id="send-recipe-name" class="text-orange-500 text-sm mb-4"></p>
    <div id="machine-list" class="space-y-2 mb-4"></div>
    <button onclick="closeSendModal()" class="w-full py-3 rounded-2xl bg-gray-100 text-gray-600 font-medium" data-i18n="recipes.cancel">取消</button>
  </div>
</div>

<div id="toast"></div>

<script src="js/i18n.js"></script>
<script src="js/app.js"></script>

  // Demo tips

      5: '可以提前一天准备，隔夜风味更佳。',

      14: '蘑菇要大火快炒，出水后继续炒才能收汁。'
    },
    en: {
      1: 'Resting the steak is crucial - it allows juices to redistribute for a more tender bite.',
      2: 'The longer the slow cook, the more tender the meat. A Dutch oven works best.',
      3: 'Don\'t overcook the beef - keeping it tender is key.',
      4: 'Don\'t overcook the lamb chops - pink inside is most tender.',
      5: 'Can be prepared a day ahead for better flavor.',
      6: 'More glazing means more caramelization - brush frequently for best results.',
      7: 'Hungarian paprika is the soul of this dish - don\'t skip it.',
      8: 'Insert a meat thermometer in the thickest part - 165°F means it\'s done.',
      9: 'Add sour cream at the end - never let it boil.',
      10: 'Don\'t overcook the shrimp - cook until just pink for best texture.',
      11: 'Salmon is best medium - slightly pink in the center.',
      12: 'Salt the pasta water generously - it\'s key to seasoning.',
      13: 'Cut vegetables uniformly for even cooking.',

    },
    hu: {
      1: 'A pihentetés kulcsfontosságú - a levek eloszlása miatt puhább lesz.',

      3: 'Ne főzze túl a marhahúst - a puhán maradás a lényeg.',
      4: 'Ne süssük túl a bárányt - a rózsaszín belseje a legpuhább.',

      9: 'A tejfölt a végén adja hozzá - soha ne forralja.',
      10: 'Ne főzze túl a garnélát - épp csak rózsaszínre.',
      11: 'A lazac a legjobb közepesen - enyhén rózsaszín belsejű.',
      12: 'Sózza bőven a tészta vizet - ez a fűszerezés kulcsa.',
      13: 'Egyenlő méretűre vágja a zöldségeket.',
      14: 'Nagy lángon pirítsa a gombát, amíg a leve el nem párolog.'

  function goBack() {
    if (document.referrer && document.referrer.includes('recipes.html')) {
      history.back();
    } else {
      window.location.href = 'recipes.html';
    }
  }

  function renderRecipe() {
    const name = getRecipeName(recipe);
    const diff = getDiffLabel(recipe.diff);

    // Set page title
    document.title = `Wokology — ${name}`;

    // Hero
    document.getElementById('recipe-img').src = recipe.img;
    document.getElementById('recipe-img').alt = name;

    // Tag
    const tagEl = document.getElementById('recipe-tag');
    if (recipe.free) {
      tagEl.innerHTML = `<span class="lbl-free">${t('recipes.free_tag')}</span>`;
    } else {
      tagEl.innerHTML = `<span class="lbl-premium">${t('recipes.premium_tag')}</span>`;
    }

    // Title Card
    document.getElementById('recipe-name').textContent = name;
    document.getElementById('recipe-time').textContent = `${recipe.time} ${t('recipes.min_unit')}`;
    document.getElementById('recipe-diff').textContent = diff;

    // Ingredients
    const ingList = document.getElementById('ingredients-list');
    ingList.innerHTML = recipe.ingredients.map(ing => `
      <li class="flex items-center gap-2 text-sm text-gray-700">
        <span class="w-2 h-2 rounded-full bg-orange-400 flex-shrink-0"></span>
        <span>${ing}</span>
      </li>
    `).join('');

    // Steps
    const steps = DEMO_STEPS[recipe.id] || [];
    const stepsList = document.getElementById('steps-list');
    stepsList.innerHTML = steps.map((step, i) => `
      <li class="flex gap-3">
        <span class="flex-shrink-0 w-6 h-6 rounded-full bg-orange-500 text-white text-xs font-bold flex items-center justify-center">${i + 1}</span>
        <p class="text-sm text-gray-700 flex-1">${step}</p>
      </li>
    `).join('');

    // Tips
    const lang = getLang();
    const tips = (DEMO_TIPS[lang] || DEMO_TIPS.zh)[recipe.id] || '';
    document.getElementById('recipe-tips').textContent = tips;
  }

  // Send Modal
  function openSendModal() {
    document.getElementById('send-recipe-name').textContent = getRecipeName(recipe);
    const available = DEMO_MACHINES.filter(m => m.status !== 'offline');
    const ml = document.getElementById('machine-list');
    if (!available.length) {
      ml.innerHTML = `<p class="text-gray-400 text-sm text-center py-4">${t('recipes.no_machine')}</p>`;
    } else {
      ml.innerHTML = available.map(m => {
        const store = getStoreById(m.storeId);
        const storeName = store ? getStoreName(store) : t('machines.not_bound');
        return `<button onclick="doSend(${m.id})"
          class="w-full flex items-center gap-3 bg-gray-50 rounded-2xl px-4 py-3 ripple text-left">
          <span class="material-icons-round text-orange-500">precision_manufacturing</span>
          <div class="flex-1">
            <p class="font-semibold text-gray-800 text-sm">${m.serial}</p>
            <p class="text-gray-400 text-xs">${storeName}</p>
          </div>
          <span class="tag ${getMachineStatusClass(m.status)} text-xs">${getMachineStatusLabel(m.status)}</span>
        </button>`;
      }).join('');
    }
    document.getElementById('send-modal').classList.add('open');
  }

  function doSend(machineId) {
    closeSendModal();
    setTimeout(() => showToast(t('recipes.send_success')), 300);
  }

  function closeSendModal(event) {
    if (event && event.target !== document.getElementById('send-modal')) return;
    document.getElementById('send-modal').classList.remove('open');
  }

  function onLangChange() {
    renderRecipe();
    applyI18n();
  }

  renderRecipe();
</script>
</body>
</html>
