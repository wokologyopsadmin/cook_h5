<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>" />
  <title>Wokology — 菜谱库</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-gray-50" data-page-title="recipes.title">

<div class="page-wrap fade-in">

  <!-- Header / Search Bar -->
  <div class="bg-white px-5 pt-12 pb-3 sticky top-0 z-10 shadow-sm">
    <h1 class="text-xl font-bold text-gray-800 mb-3" data-i18n="recipes.title">菜谱库</h1>
    <div class="flex items-center bg-gray-100 rounded-2xl px-4 py-2.5 gap-3 mb-3">
      <span class="material-icons-round text-gray-400 text-xl">search</span>
      <input id="search-input" type="text" class="flex-1 bg-transparent text-sm text-gray-700 placeholder-gray-400"
        data-i18n-ph="recipes.search_ph" placeholder="搜索菜谱名称..." oninput="onSearch(this.value)" />
      <button id="clear-btn" onclick="clearSearch()" class="hidden">
        <span class="material-icons-round text-gray-400 text-xl">close</span>
      </button>
    </div>
    <!-- Category Tabs -->
    <div class="scroll-x flex gap-2 pb-1">
      <button onclick="setCategory('all', this)" class="flex-shrink-0 tag bg-orange-500 text-white cat-active" data-i18n="recipes.cat_all">全部</button>
      <button onclick="setCategory('beef', this)" class="flex-shrink-0 tag bg-gray-100 text-gray-600" data-i18n="recipes.cat_beef">🥩 牛肉</button>
      <button onclick="setCategory('lamb', this)" class="flex-shrink-0 tag bg-gray-100 text-gray-600" data-i18n="recipes.cat_lamb">🍖 羊肉</button>
      <button onclick="setCategory('pork', this)" class="flex-shrink-0 tag bg-gray-100 text-gray-600" data-i18n="recipes.cat_pork">🥓 猪肉</button>
      <button onclick="setCategory('chicken', this)" class="flex-shrink-0 tag bg-gray-100 text-gray-600" data-i18n="recipes.cat_chicken">🍗 鸡肉</button>
      <button onclick="setCategory('seafood', this)" class="flex-shrink-0 tag bg-gray-100 text-gray-600" data-i18n="recipes.cat_seafood">🦐 海鲜</button>
      <button onclick="setCategory('veg', this)" class="flex-shrink-0 tag bg-gray-100 text-gray-600" data-i18n="recipes.cat_veg">🥦 素菜</button>
    </div>
  </div>

  <!-- Recipe Grid -->
  <div id="recipe-grid" class="px-4 pt-4 grid grid-cols-2 gap-3"></div>
  <div id="empty-state" class="hidden text-center py-16 px-5">
    <span class="material-icons-round text-5xl text-gray-200 block mb-3">search_off</span>
    <p class="text-gray-500" data-i18n="recipes.no_results">没有找到相关菜谱</p>
  </div>

</div>

<!-- Send Recipe Sheet -->
<div id="send-modal" class="modal-overlay" onclick="closeSendModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h3 class="text-base font-bold text-gray-800 mb-1" data-i18n="recipes.choose_machine">选择要下发的机器</h3>
    <p id="send-recipe-name" class="text-orange-500 text-sm mb-4"></p>
    <div id="machine-list" class="space-y-2 mb-4"></div>
    <button onclick="closeSendModal()" class="w-full py-3 rounded-2xl bg-gray-100 text-gray-600 font-medium" data-i18n="recipes.cancel">取消</button>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <div class="flex">
    <a href="dashboard.html" id="nav-home" class="nav-btn flex-1 flex flex-col items-center py-3 gap-0.5">
      <span class="material-icons-round text-2xl nav-icon">home</span>
      <span class="text-xs nav-label" data-i18n="nav.home">首页</span>
    </a>
    <a href="recipes.html" id="nav-recipes" class="nav-btn active flex-1 flex flex-col items-center py-3 gap-0.5">
      <span class="material-icons-round text-2xl nav-icon">menu_book</span>
      <span class="text-xs nav-label" data-i18n="nav.recipes">菜谱</span>
    </a>
    <a href="publish.html" class="flex-1 flex flex-col items-center py-3 gap-0.5 relative">
      <div class="w-12 h-12 bg-orange-500 rounded-full flex items-center justify-center -mt-6 shadow-lg shadow-orange-200">
        <span class="material-icons-round text-white text-2xl">add</span>
      </div>
      <span class="text-xs text-gray-400 mt-0.5" data-i18n="nav.publish">发布</span>
    </a>
    <a href="machines.html" id="nav-machines" class="nav-btn flex-1 flex flex-col items-center py-3 gap-0.5">
      <span class="material-icons-round text-2xl nav-icon">precision_manufacturing</span>
      <span class="text-xs nav-label" data-i18n="nav.machines">机器</span>
    </a>
    <a href="profile.html" id="nav-profile" class="nav-btn flex-1 flex flex-col items-center py-3 gap-0.5">
      <span class="material-icons-round text-2xl nav-icon">person_outline</span>
      <span class="text-xs nav-label" data-i18n="nav.profile">我的</span>
    </a>
  </div>
</nav>

<div id="toast"></div>

<script src="js/i18n.js"></script>
<script src="js/app.js"></script>
<script>
  requireAuth();
  initNavBar('nav-recipes');

  let currentCat = 'all';
  let searchQ = '';
  let pendingSendId = null;

  function getFiltered() {
    return DEMO_RECIPES.filter(r => {
      const matchCat = currentCat === 'all' || r.cat === currentCat;
      const name = getRecipeName(r).toLowerCase();
      const matchQ = !searchQ || name.includes(searchQ.toLowerCase());
      return matchCat && matchQ;
    });
  }

  function renderGrid() {
    const list = getFiltered();
    const grid = document.getElementById('recipe-grid');
    const empty = document.getElementById('empty-state');
    if (!list.length) {
      grid.innerHTML = '';
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');
    grid.innerHTML = list.map(r => {
      const name = getRecipeName(r);
      const diff = getDiffLabel(r.diff);
      const label = r.free
        ? `<span class="lbl-free">${t('recipes.free_tag')}</span>`
        : `<span class="lbl-premium">${t('recipes.premium_tag')}</span>`;
      return `<a href="recipe-detail.html?id=${r.id}" class="bg-white rounded-2xl overflow-hidden shadow-sm card-press block">
        <div class="relative">
          <img src="${r.img}" alt="${name}" class="recipe-img" loading="lazy"
            onerror="this.style.background='#fff7ed';this.style.display='flex';this.textContent='🍳'" />
          <div class="absolute top-2 left-2">${label}</div>
        </div>
        <div class="p-3">
          <p class="font-bold text-gray-800 text-sm leading-tight mb-1">${name}</p>
          <div class="flex items-center gap-1.5 text-xs text-gray-400 mb-2">
            <span>${diff}</span><span>·</span><span>${r.time} ${t('recipes.min_unit')}</span>
          </div>
          <button onclick="event.preventDefault();openSend(${r.id},'${name.replace(/'/g,"\\'")}')"
            class="w-full bg-orange-500 text-white rounded-xl py-2 text-xs font-semibold ripple flex items-center justify-center gap-1">
            <span class="material-icons-round" style="font-size:14px">send</span>
            <span data-send-btn>${t('recipes.send_btn')}</span>
          </button>
        </div>
      </a>`;
    }).join('');
  }

  function setCategory(cat, btn) {
    currentCat = cat;
    document.querySelectorAll('[onclick^="setCategory"]').forEach(b => {
      b.classList.remove('bg-orange-500', 'text-white', 'cat-active');
      b.classList.add('bg-gray-100', 'text-gray-600');
    });
    btn.classList.add('bg-orange-500', 'text-white', 'cat-active');
    btn.classList.remove('bg-gray-100', 'text-gray-600');
    renderGrid();
  }

  function onSearch(val) {
    searchQ = val;
    document.getElementById('clear-btn').classList.toggle('hidden', !val);
    renderGrid();
  }
  function clearSearch() {
    searchQ = '';
    document.getElementById('search-input').value = '';
    document.getElementById('clear-btn').classList.add('hidden');
    renderGrid();
  }

  function openSend(id, name) {
    pendingSendId = id;
    document.getElementById('send-recipe-name').textContent = name;
    const available = DEMO_MACHINES.filter(m => m.status !== 'offline');
    const ml = document.getElementById('machine-list');
    if (!available.length) {
      ml.innerHTML = `<p class="text-gray-400 text-sm text-center py-4">${t('recipes.no_machine')}</p>`;
    } else {
      ml.innerHTML = available.map(m => {
        const store = getStoreById(m.storeId);
        const storeName = store ? getStoreName(store) : t('machines.not_bound');
        return `<button onclick="doSend(${m.id})"
          class="w-full flex items-center gap-3 bg-gray-50 rounded-2xl px-4 py-3 ripple text-left">
          <span class="material-icons-round text-orange-500">precision_manufacturing</span>
          <div class="flex-1">
            <p class="font-semibold text-gray-800 text-sm">${m.serial}</p>
            <p class="text-gray-400 text-xs">${storeName}</p>
          </div>
          <span class="tag ${getMachineStatusClass(m.status)} text-xs">${getMachineStatusLabel(m.status)}</span>
        </button>`;
      }).join('');
    }
    document.getElementById('send-modal').classList.add('open');
  }

  function doSend(machineId) {
    closeSendModal();
    setTimeout(() => showToast(t('recipes.send_success')), 300);
  }

  function closeSendModal(event) {
    if (event && event.target !== document.getElementById('send-modal')) return;
    document.getElementById('send-modal').classList.remove('open');
    pendingSendId = null;
  }

  function onLangChange() {
    renderGrid();
    // re-apply category labels
    applyI18n();
  }

  renderGrid();
</script>
</body>
</html>
