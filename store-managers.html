<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>" />
  <title>Wokology — 管理人员</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-gray-50" data-page-title="managers.title">

<div class="page-wrap fade-in">

  <!-- Header -->
  <div class="bg-white px-5 pt-12 pb-4 sticky top-0 z-10 shadow-sm">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="stores.html" class="p-1">
          <span class="material-icons-round text-gray-500">arrow_back</span>
        </a>
        <div>
          <h1 class="text-xl font-bold text-gray-800" data-i18n="managers.title">管理人员</h1>
          <p id="store-name-display" class="text-orange-500 text-sm"></p>
        </div>
      </div>
      <button onclick="openCreateModal()" class="bg-purple-500 text-white rounded-xl px-4 py-2 text-sm font-semibold flex items-center gap-1.5">
        <span class="material-icons-round text-lg">person_add</span>
        <span data-i18n="managers.add_btn">添加</span>
      </button>
    </div>
  </div>

  <!-- Manager List -->
  <div id="manager-list" class="px-5 pt-4 space-y-3"></div>
  <div id="empty-state" class="hidden text-center py-16 px-5">
    <span class="material-icons-round text-5xl text-gray-200 block mb-3">person_add</span>
    <p class="text-gray-500" data-i18n="managers.no_managers">暂无管理人员</p>
  </div>

<!-- Create/Edit Manager Modal -->
<div id="manager-modal" class="modal-overlay" onclick="closeModal(event)">
  <div class="modal-sheet max-h-[85vh] overflow-y-auto">
    <div class="modal-handle"></div>
    <h3 id="modal-title" class="text-base font-bold text-gray-800 mb-4" data-i18n="managers.create_title">创建管理人员</h3>

    <div class="mb-4">
      <label class="block text-sm font-semibold text-gray-700 mb-1.5" data-i18n="managers.account_label">账号 *</label>
      <input id="mgr-account" type="text" class="auth-input" data-i18n-ph="managers.account_ph" placeholder="登录账号（英文）" />
    </div>
    <div class="mb-4">
      <label class="block text-sm font-semibold text-gray-700 mb-1.5" data-i18n="managers.name_label">姓名 *</label>
      <input id="mgr-name" type="text" class="auth-input" data-i18n-ph="managers.name_ph" placeholder="管理人员姓名" />
    </div>
    <div class="mb-4" id="password-field">
      <label class="block text-sm font-semibold text-gray-700 mb-1.5" data-i18n="managers.password_label">初始密码 *</label>
      <input id="mgr-password" type="text" class="auth-input" data-i18n-ph="managers.password_ph" placeholder="设置初始密码" />
    </div>
    <div class="mb-4">
      <label class="block text-sm font-semibold text-gray-700 mb-1.5" data-i18n="managers.email_label">邮箱</label>
      <input id="mgr-email" type="email" class="auth-input" data-i18n-ph="managers.email_ph" placeholder="邮箱地址" />
    </div>
    <div class="mb-4">
      <label class="block text-sm font-semibold text-gray-700 mb-1.5" data-i18n="managers.store_label">管理门店</label>
      <select id="mgr-store" class="auth-input" title="选择门店">
        <option value="" data-i18n="managers.store_select">选择门店</option>
      </select>
    </div>

    <button onclick="doSaveManager()" class="auth-btn" data-i18n="managers.save_btn">保存</button>
    <button onclick="closeModal()" class="w-full py-3 rounded-2xl bg-gray-100 text-gray-600 font-medium mt-3" data-i18n="common.cancel">取消</button>
  </div>
</div>

<!-- Reset Password Modal -->
<div id="reset-modal" class="modal-overlay" onclick="closeResetModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h3 class="text-base font-bold text-gray-800 mb-1" data-i18n="managers.reset_title">重置密码</h3>
    <p id="reset-manager-name" class="text-orange-500 text-sm mb-4"></p>
    <div class="mb-4">
      <label class="block text-sm font-semibold text-gray-700 mb-1.5" data-i18n="managers.new_password_label">新密码 *</label>
      <input id="new-password" type="text" class="auth-input" data-i18n-ph="managers.new_password_ph" placeholder="输入新密码" />
    </div>
    <button onclick="doResetPassword()" class="auth-btn" data-i18n="managers.reset_btn">重置密码</button>
    <button onclick="closeResetModal()" class="w-full py-3 rounded-2xl bg-gray-100 text-gray-600 font-medium mt-3" data-i18n="common.cancel">取消</button>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <div class="flex">
    <a href="dashboard.html" id="nav-home" class="nav-btn flex-1 flex flex-col items-center py-3 gap-0.5">
      <span class="material-icons-round text-2xl nav-icon">home</span>
      <span class="text-xs nav-label" data-i18n="nav.home">首页</span>
    </a>
    <a href="recipes.html" id="nav-recipes" class="nav-btn flex-1 flex flex-col items-center py-3 gap-0.5">
      <span class="material-icons-round text-2xl nav-icon">menu_book</span>
      <span class="text-xs nav-label" data-i18n="nav.recipes">菜谱</span>
    </a>
    <a href="publish.html" class="flex-1 flex flex-col items-center py-3 gap-0.5 relative">
      <div class="w-12 h-12 bg-orange-500 rounded-full flex items-center justify-center -mt-6 shadow-lg shadow-orange-200">
        <span class="material-icons-round text-white text-2xl">add</span>
      </div>
      <span class="text-xs text-gray-400 mt-0.5" data-i18n="nav.publish">发布</span>
    </a>
    <a href="machines.html" id="nav-machines" class="nav-btn flex-1 flex flex-col items-center py-3 gap-0.5">
      <span class="material-icons-round text-2xl nav-icon">precision_manufacturing</span>
      <span class="text-xs nav-label" data-i18n="nav.machines">机器</span>
    </a>
    <a href="profile.html" id="nav-profile" class="nav-btn flex-1 flex flex-col items-center py-3 gap-0.5">
      <span class="material-icons-round text-2xl nav-icon">person_outline</span>
      <span class="text-xs nav-label" data-i18n="nav.profile">我的</span>
    </a>
  </div>
</nav>

<div id="toast"></div>

<script src="js/i18n.js"></script>
<script src="js/app.js"></script>
<script>
  requireAuth();
  initNavBar('nav-home');

  let currentStoreId = null;
  let editingManagerId = null;
  let resettingManagerId = null;

  // 从 URL 获取门店 ID
  function getStoreIdFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get('storeId') ? parseInt(params.get('storeId')) : null;
  }

  function init() {
    currentStoreId = getStoreIdFromUrl();

    // 更新页面标题
    if (currentStoreId) {
      const store = getStoreById(currentStoreId);
      if (store) {
        document.getElementById('store-name-display').textContent = getStoreName(store);
      }
    } else {
      document.getElementById('store-name-display').textContent = t('managers.all_stores');
    }

    // 填充门店选择
    const storeSelect = document.getElementById('mgr-store');
    DEMO_STORES.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.id;
      opt.textContent = getStoreName(s);
      storeSelect.appendChild(opt);
    });

    renderManagers();
  }

  function getManagersForStore() {
    const allUsers = getAllUsers();
    // 只获取 store_manager 角色
    let managers = allUsers.filter(u => u.role === 'store_manager');

    if (currentStoreId) {
      // 筛选该门店的管理人员
      managers = managers.filter(m => m.storeIds && m.storeIds.includes(currentStoreId));
    }

    return managers;
  }

  function renderManagers() {
    const list = getManagersForStore();
    const el = document.getElementById('manager-list');
    const empty = document.getElementById('empty-state');

    if (!list.length) {
      el.innerHTML = '';
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');

    el.innerHTML = list.map(m => {
      const statusClass = m.status === 'active' ? 's-online' : 's-offline';
      const statusLabel = m.status === 'active' ? t('managers.status_active') : t('managers.status_inactive');
      const emailStatus = m.emailVerified
        ? `<span class="text-green-500 text-xs">${t('managers.email_verified')}</span>`
        : `<span class="text-orange-500 text-xs">${t('managers.email_pending')}</span>`;
      const storeNames = m.storeIds && m.storeIds.length
        ? m.storeIds.map(id => {
            const s = getStoreById(id);
            return s ? getStoreName(s) : '';
          }).filter(Boolean).join(', ')
        : t('managers.no_store');

      return `<div class="bg-white rounded-2xl p-4 shadow-sm">
        <div class="flex justify-between items-start mb-3">
          <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-orange-50 rounded-xl flex items-center justify-center">
              <span class="material-icons-round text-orange-500 text-2xl">person</span>
            </div>
            <div>
              <p class="font-bold text-gray-800">${getLang() === 'en' ? (m.nameEn || m.name) : m.name}</p>
              <p class="text-gray-400 text-xs">${m.account}</p>
            </div>
          </div>
          <span class="tag ${statusClass} text-xs">${statusLabel}</span>
        </div>
        <div class="space-y-2 text-sm mb-3">
          <div class="flex justify-between">
            <span class="text-gray-500">${t('managers.email_label')}</span>
            <div class="flex items-center gap-2">
              <span class="text-gray-800">${m.email || t('managers.email_not_set')}</span>
              ${m.email ? emailStatus : ''}
            </div>
          </div>
          <div class="flex justify-between">
            <span class="text-gray-500">${t('managers.store_label')}</span>
            <span class="text-gray-800 text-right">${storeNames}</span>
          </div>
        </div>
        <div class="flex gap-2">
          <button onclick="openEditModal(${m.id})" class="flex-1 py-2 rounded-xl bg-gray-100 text-gray-700 text-sm font-medium">
            <span class="material-icons-round text-sm align-middle">edit</span>
            <span>${t('managers.edit_btn')}</span>
          </button>
          <button onclick="openResetModal(${m.id})" class="flex-1 py-2 rounded-xl bg-blue-50 text-blue-600 text-sm font-medium">
            <span class="material-icons-round text-sm align-middle">lock_reset</span>
            <span>${t('managers.reset_pwd_btn')}</span>
          </button>
          <button onclick="doToggleStatus(${m.id})" class="py-2 px-3 rounded-xl ${m.status === 'active' ? 'bg-red-50 text-red-500' : 'bg-green-50 text-green-600'}">
            <span class="material-icons-round text-lg">${m.status === 'active' ? 'block' : 'check_circle'}</span>
          </button>
        </div>
      </div>`;
    }).join('');
  }

  function openCreateModal() {
    editingManagerId = null;
    document.getElementById('modal-title').textContent = t('managers.create_title');
    document.getElementById('mgr-account').value = '';
    document.getElementById('mgr-account').disabled = false;
    document.getElementById('mgr-name').value = '';
    document.getElementById('mgr-password').value = '';
    document.getElementById('password-field').style.display = 'block';
    document.getElementById('mgr-email').value = '';
    document.getElementById('mgr-store').value = currentStoreId || '';
    document.getElementById('manager-modal').classList.add('open');
  }

  function openEditModal(id) {
    const manager = getAllUsers().find(u => u.id === id);
    if (!manager) return;

    editingManagerId = id;
    document.getElementById('modal-title').textContent = t('managers.edit_title');
    document.getElementById('mgr-account').value = manager.account;
    document.getElementById('mgr-account').disabled = true;
    document.getElementById('mgr-name').value = manager.name;
    document.getElementById('password-field').style.display = 'none';
    document.getElementById('mgr-email').value = manager.email || '';
    document.getElementById('mgr-store').value = manager.storeIds && manager.storeIds[0] ? manager.storeIds[0] : '';
    document.getElementById('manager-modal').classList.add('open');
  }

  function closeModal(event) {
    if (event && event.target !== document.getElementById('manager-modal')) return;
    document.getElementById('manager-modal').classList.remove('open');
    editingManagerId = null;
  }

  function doSaveManager() {
    const account = document.getElementById('mgr-account').value.trim();
    const name = document.getElementById('mgr-name').value.trim();
    const password = document.getElementById('mgr-password').value.trim();
    const email = document.getElementById('mgr-email').value.trim();
    const storeId = document.getElementById('mgr-store').value;

    if (!account || !name) {
      showToast(t('managers.fill_required'));
      return;
    }

    if (!editingManagerId && !password) {
      showToast(t('managers.set_password'));
      return;
    }

    // 检查账号是否已存在
    const existing = getUserByAccount(account);
    if (!editingManagerId && existing) {
      showToast(t('managers.account_exists'));
      return;
    }

    if (editingManagerId) {
      // 更新
      updateManager(editingManagerId, {
        name: name,
        nameEn: name,
        email: email,
        storeIds: storeId ? [parseInt(storeId)] : []
      });
      showToast(t('managers.updated'));
    } else {
      // 创建
      createManager({
        account: account,
        name: name,
        password: password,
        email: email,
        storeIds: storeId ? [parseInt(storeId)] : []
      });
      showToast(t('managers.created'));
    }

    closeModal();
    renderManagers();
  }

  function openResetModal(id) {
    const manager = getAllUsers().find(u => u.id === id);
    if (!manager) return;

    resettingManagerId = id;
    document.getElementById('reset-manager-name').textContent = manager.name + ' (' + manager.account + ')';
    document.getElementById('new-password').value = '';
    document.getElementById('reset-modal').classList.add('open');
  }

  function closeResetModal(event) {
    if (event && event.target !== document.getElementById('reset-modal')) return;
    document.getElementById('reset-modal').classList.remove('open');
    resettingManagerId = null;
  }

  function doResetPassword() {
    const newPassword = document.getElementById('new-password').value.trim();
    if (!newPassword) {
      showToast(t('managers.enter_password'));
      return;
    }

    resetManagerPassword(resettingManagerId, newPassword);
    closeResetModal();
    showToast(t('managers.password_reset'));
  }

  function doToggleStatus(id) {
    const manager = getAllUsers().find(u => u.id === id);
    if (!manager) return;

    const newStatus = manager.status === 'active' ? 'inactive' : 'active';
    const confirmMsg = newStatus === 'inactive'
      ? t('managers.disable_confirm')
      : t('managers.enable_confirm');

    if (!confirm(confirmMsg)) return;

    // 检查是否是 localStorage 中的管理人员
    const managers = getManagers();
    const idx = managers.findIndex(m => m.id === id);
    if (idx !== -1) {
      toggleManagerStatus(id);
    } else {
      // DEMO_USERS 中的，直接修改
      const user = DEMO_USERS.find(u => u.id === id);
      if (user) {
        user.status = newStatus;
      }
    }

    showToast(newStatus === 'active'
      ? t('managers.account_enabled')
      : t('managers.account_disabled'));
    renderManagers();
  }

  function onLangChange() {
    renderManagers();
    init();
  }

  init();
</script>
</body>
</html>
